<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@900&display=swap');
*{margin:0;padding:0;box-sizing:border-box;}
html,body{width:1000px;height:1000px;overflow:hidden;}
.canvas{width:1000px;height:1000px;background:#ffffff;position:relative;}
.ring{position:absolute;inset:26px;border-radius:50%;border:5px solid #c9a24a;}
/* 圖騰：淡化當背景水印 */
.wm{position:absolute;top:50%;left:50%;transform:translate(-50%,-52%);width:820px;height:640px;opacity:0.13;}
/* TADA：放大置頂當主體 */
.name{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);font-family:'Noto Serif TC',serif;font-size:250px;font-weight:900;color:#1e3320;letter-spacing:18px;text-indent:18px;}
</style>
</head>
<body>
<div class="canvas">
  <div class="ring"></div>
  <svg class="wm" viewBox="0 0 54 40" xmlns="http://www.w3.org/2000/svg">
    <ellipse cx="20" cy="18" rx="14" ry="10" fill="#6ab04c" transform="rotate(-30 20 18)"/>
    <ellipse cx="34" cy="18" rx="14" ry="10" fill="#6ab04c" transform="rotate(30 34 18)"/>
    <ellipse cx="18" cy="32" rx="11" ry="8" fill="#2e86c1" transform="rotate(20 18 32)"/>
    <ellipse cx="36" cy="32" rx="11" ry="8" fill="#2e86c1" transform="rotate(-20 36 32)"/>
    <ellipse cx="27" cy="25" rx="4" ry="12" fill="#1a5276"/>
  </svg>
  <div class="name">TADA</div>
</div>
</body>
</html>
