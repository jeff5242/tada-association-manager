<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@900&display=swap');
*{margin:0;padding:0;box-sizing:border-box;}
html,body{width:1000px;height:1000px;overflow:hidden;}
.canvas{width:1000px;height:1000px;background:radial-gradient(circle at 50% 42%,#24402a,#16241a);display:flex;align-items:center;justify-content:center;position:relative;}
.ring{width:820px;height:820px;border-radius:50%;background:#ffffff;border:14px solid #b8913a;display:flex;flex-direction:column;align-items:center;justify-content:center;box-shadow:0 20px 60px rgba(0,0,0,0.35);}
.mark{width:560px;height:440px;}
.name{font-family:'Noto Serif TC',serif;font-size:78px;font-weight:900;color:#1e3320;letter-spacing:14px;text-indent:14px;margin-top:6px;}
</style>
</head>
<body>
<div class="canvas">
  <div class="ring">
    <svg class="mark" viewBox="0 0 54 40" xmlns="http://www.w3.org/2000/svg">
      <ellipse cx="20" cy="18" rx="14" ry="10" fill="#6ab04c" transform="rotate(-30 20 18)"/>
      <ellipse cx="34" cy="18" rx="14" ry="10" fill="#6ab04c" transform="rotate(30 34 18)"/>
      <ellipse cx="18" cy="32" rx="11" ry="8" fill="#2e86c1" transform="rotate(20 18 32)"/>
      <ellipse cx="36" cy="32" rx="11" ry="8" fill="#2e86c1" transform="rotate(-20 36 32)"/>
      <ellipse cx="27" cy="25" rx="4" ry="12" fill="#1a5276"/>
    </svg>
    <div class="name">TADA</div>
  </div>
</div>
</body>
</html>
